<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page">
    <div class="card result-card">
        <h1>SmartTrip Result</h1>

        <p class="note">User: {{ username }}</p>

        <div class="result-box">
            <p>Estimated Taxi Travel Time</p>
            <h2>{{ prediction }} minutes</h2>
        </div>

        <p class="note">
            Prediction generated using a trained Random Forest machine learning model.
        </p>

        <a class="link-btn" href="/">Predict Another Trip</a>
        <a class="history-link" href="/history">View My History</a>
    </div>
</div>

</body>
</html>
